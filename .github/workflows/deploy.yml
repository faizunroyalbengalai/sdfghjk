name: Deploy — fdgrg

on:
  workflow_dispatch:

env:
  ACTIONS_RUNNER_FORCED_INTERNAL_NODE_VERSION: node24
  ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node24

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test --if-present

  build_push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve image tag
        id: meta
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          PROJECT_LOWER=$(echo "fdgrg" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER_LOWER}/${PROJECT_LOWER}:${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Build and push Docker image
        run: |
          docker build -t ${{ steps.meta.outputs.image }} .
          docker push ${{ steps.meta.outputs.image }}

  provision:
    name: Provision AKS via Terraform
    runs-on: ubuntu-latest
    needs: build_push
    outputs:
      cluster_name: ${{ steps.tf_out.outputs.cluster_name }}
      resource_group: ${{ steps.tf_out.outputs.resource_group }}
      namespace:    ${{ steps.tf_out.outputs.namespace }}
      app_port:     ${{ steps.tf_out.outputs.app_port }}
      db_host:      ${{ steps.tf_out.outputs.db_host }}
      db_port:      ${{ steps.tf_out.outputs.db_port }}
      db_name:      ${{ steps.tf_out.outputs.db_name }}
    env:
      ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}.tfstate"
      - name: Terraform plan
        working-directory: terraform
        env:
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          EXTRA_ARGS=()
          [ -n "$DB_NAME" ]     && EXTRA_ARGS+=(-var "db_name=$DB_NAME")
          [ -n "$DB_USERNAME" ] && EXTRA_ARGS+=(-var "db_username=$DB_USERNAME")
          [ -n "$DB_PASSWORD" ] && EXTRA_ARGS+=(-var "db_password=$DB_PASSWORD")
          terraform plan \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="azure_region=${{ secrets.AZURE_REGION }}" \
            -var="azure_db_region=${{ secrets.AZURE_DB_REGION }}" \
            -var="container_image=${{ needs.build_push.outputs.image }}" \
            -var="registry_server=ghcr.io" \
            -var="registry_username=${{ github.actor }}" \
            -var="registry_password=${{ secrets.GITHUB_TOKEN }}" \
            "${EXTRA_ARGS[@]}" \
            -out=tfplan
      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
      - name: Capture Terraform outputs
        id: tf_out
        working-directory: terraform
        run: |
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || true)
          RG=$(terraform output -raw resource_group_name 2>/dev/null || true)
          NS=$(terraform output -raw namespace 2>/dev/null || true)
          PORT=$(terraform output -raw app_port 2>/dev/null || true)
          echo "cluster_name=${CLUSTER}"   >> $GITHUB_OUTPUT
          echo "resource_group=${RG}"      >> $GITHUB_OUTPUT
          echo "namespace=${NS}"           >> $GITHUB_OUTPUT
          echo "app_port=${PORT}"          >> $GITHUB_OUTPUT
          DB_HOST=$(terraform output -raw db_host 2>/dev/null || true)
          DB_PORT=$(terraform output -raw db_port 2>/dev/null || true)
          DB_NAME=$(terraform output -raw db_name 2>/dev/null || true)
          echo "db_host=${DB_HOST}" >> $GITHUB_OUTPUT
          echo "db_port=${DB_PORT}" >> $GITHUB_OUTPUT
          echo "db_name=${DB_NAME}" >> $GITHUB_OUTPUT
          echo "AKS cluster: ${CLUSTER} (rg=${RG}, ns=${NS})"

  deploy:
    name: Deploy to AKS (kubectl)
    runs-on: ubuntu-latest
    needs: [build_push, provision]
    outputs:
      url: ${{ steps.ingress.outputs.url }}
    env:
      ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          # Use latest stable client — kubectl is forward-compatible one
          # minor version, so this works with whatever AKS default version
          # Azure picks at provision time.
          version: 'latest'
      - name: Azure login
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" --tenant "$ARM_TENANT_ID" > /dev/null
          az account set --subscription "$ARM_SUBSCRIPTION_ID"
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ needs.provision.outputs.resource_group }}" \
            --name "${{ needs.provision.outputs.cluster_name }}" \
            --overwrite-existing
      - name: Create namespace
        run: |
          kubectl create namespace "${{ needs.provision.outputs.namespace }}" \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace "${{ needs.provision.outputs.namespace }}" \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Create app env secret
        run: |
          NS="${{ needs.provision.outputs.namespace }}"
          PROJECT_LOWER=$(echo "fdgrg" | tr '[:upper:]' '[:lower:]')
          ARGS=()
          ARGS+=(--from-literal=PORT=${{ needs.provision.outputs.app_port }})
          ARGS+=(--from-literal=NODE_ENV=production)
          ARGS+=(--from-literal=APP_ENV=production)
          DB_HOST="${{ needs.provision.outputs.db_host }}"
          DB_PORT="${{ needs.provision.outputs.db_port }}"
          DB_NAME="${{ needs.provision.outputs.db_name }}"
          DB_USER="${{ secrets.DB_USERNAME }}"
          DB_PASS="${{ secrets.DB_PASSWORD }}"
          [ -n "$DB_HOST" ] && ARGS+=(--from-literal=DB_HOST="${DB_HOST}")
          [ -n "$DB_PORT" ] && ARGS+=(--from-literal=DB_PORT="${DB_PORT}")
          [ -n "$DB_NAME" ] && ARGS+=(--from-literal=DB_NAME="${DB_NAME}")
          [ -n "$DB_USER" ] && ARGS+=(--from-literal=DB_USER="${DB_USER}")
          [ -n "$DB_USER" ] && ARGS+=(--from-literal=DB_USERNAME="${DB_USER}")
          [ -n "$DB_PASS" ] && ARGS+=(--from-literal=DB_PASSWORD="${DB_PASS}")
          ARGS+=(--from-literal=DB_TYPE=postgres)
          if [ -n "$DB_HOST" ] && [ -n "$DB_USER" ] && [ -n "$DB_PASS" ] && [ -n "$DB_NAME" ]; then
            ARGS+=(--from-literal=DATABASE_URL="postgresql://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require")
          fi
          kubectl create secret generic "${PROJECT_LOWER}-env" \
            --namespace "$NS" \
            "${ARGS[@]}" \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Apply Kubernetes manifests
        run: |
          NS="${{ needs.provision.outputs.namespace }}"
          PROJECT_LOWER=$(echo "fdgrg" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ needs.build_push.outputs.image }}"
          APP_PORT="${{ needs.provision.outputs.app_port }}"
          HEALTH_PATH="/health"
          INIT_DELAY="30"
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${PROJECT_LOWER}
            namespace: ${NS}
            labels:
              app: ${PROJECT_LOWER}
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: ${PROJECT_LOWER}
            strategy:
              type: RollingUpdate
              rollingUpdate:
                maxSurge: 1
                maxUnavailable: 0
            template:
              metadata:
                labels:
                  app: ${PROJECT_LOWER}
              spec:
                imagePullSecrets:
                  - name: ghcr-pull-secret
                containers:
                  - name: ${PROJECT_LOWER}
                    image: ${IMAGE}
                    ports:
                      - containerPort: ${APP_PORT}
                    envFrom:
                      - secretRef:
                          name: ${PROJECT_LOWER}-env
                    resources:
                      requests:
                        cpu: "250m"
                        memory: "256Mi"
                      limits:
                        cpu: "500m"
                        memory: "512Mi"
                    readinessProbe:
                      httpGet:
                        path: ${HEALTH_PATH}
                        port: ${APP_PORT}
                      initialDelaySeconds: ${INIT_DELAY}
                      periodSeconds: 10
                      failureThreshold: 3
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${PROJECT_LOWER}
            namespace: ${NS}
          spec:
            selector:
              app: ${PROJECT_LOWER}
            ports:
              - port: 80
                targetPort: ${APP_PORT}
            type: LoadBalancer
          EOF
      - name: Wait for rollout
        run: |
          NS="${{ needs.provision.outputs.namespace }}"
          PROJECT_LOWER=$(echo "fdgrg" | tr '[:upper:]' '[:lower:]')
          if ! kubectl rollout status deployment/${PROJECT_LOWER} \
               -n "$NS" --timeout=300s; then
            echo "--- Pod status ---"
            kubectl get pods -n "$NS" -l app="${PROJECT_LOWER}"
            echo "--- Pod events ---"
            kubectl describe pods -n "$NS" -l app="${PROJECT_LOWER}" | tail -40
            echo "--- Pod logs (last 50 lines) ---"
            kubectl logs -n "$NS" -l app="${PROJECT_LOWER}" --tail=50 2>/dev/null || true
            echo "Rollout timed out — continuing to expose URL anyway"
          fi
      - name: Get LoadBalancer IP
        id: ingress
        run: |
          NS="${{ needs.provision.outputs.namespace }}"
          PROJECT_LOWER=$(echo "fdgrg" | tr '[:upper:]' '[:lower:]')
          echo "Waiting for LoadBalancer IP to be assigned..."
          for i in $(seq 1 30); do
            IP=$(kubectl get service "${PROJECT_LOWER}" -n "$NS" \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            if [ -n "$IP" ]; then
              echo "url=http://${IP}" >> $GITHUB_OUTPUT
              echo "LoadBalancer IP: ${IP}"
              break
            fi
            echo "Attempt ${i}/30 — LoadBalancer not ready yet, waiting 20s..."
            sleep 20
          done
          if [ -z "$IP" ]; then
            echo "LoadBalancer IP not assigned within timeout — check Azure portal"
            echo "url=" >> $GITHUB_OUTPUT
          fi
